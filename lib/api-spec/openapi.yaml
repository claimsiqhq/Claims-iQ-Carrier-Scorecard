openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Claims iQ Audit API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: claims
    description: Claims operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /claims:
    get:
      operationId: listClaims
      tags: [claims]
      summary: List all claims
      responses:
        "200":
          description: List of claims
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Claim"

  /claims/{id}:
    get:
      operationId: getClaimDetail
      tags: [claims]
      summary: Get a single claim with documents and audit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Claim with documents, audit, scores, and findings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimDetail"
        "404":
          description: Claim not found

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /claims/{id}/documents:
    post:
      operationId: uploadClaimDocument
      tags: [claims]
      summary: Register an uploaded document to a claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Document registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /claims/{id}/documents/{docId}:
    delete:
      operationId: deleteClaimDocument
      tags: [claims]
      summary: Delete a document from a claim
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: docId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /claims/{id}/documents/{docId}/extract:
    post:
      operationId: extractDocumentText
      tags: [claims]
      summary: Extract text from an uploaded document (PDF)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: docId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Text extracted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractTextResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /claims/{id}/email/send:
    post:
      operationId: sendAuditEmail
      tags: [claims]
      summary: Send audit email via SendGrid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendEmailRequest'
      responses:
        '200':
          description: Email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          description: Missing recipient
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to send
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessEnvelope:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    CreateDocumentRequest:
      type: object
      required: [type, objectPath, fileName]
      properties:
        type:
          type: string
        objectPath:
          type: string
        fileName:
          type: string
        contentType:
          type: string

    ExtractTextResponse:
      type: object
      required: [documentId, extractedLength]
      properties:
        documentId:
          type: string
        extractedLength:
          type: integer
        preview:
          type: string

    SendEmailRequest:
      type: object
      required: [to]
      properties:
        to:
          type: string
          format: email
        subject:
          type: string
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Claim:
      type: object
      required: [id, claimNumber, insuredName, status]
      properties:
        id:
          type: string
        claimNumber:
          type: string
        insuredName:
          type: string
        carrier:
          type: string
        dateOfLoss:
          type: string
        status:
          type: string
        createdAt:
          type: string

    Document:
      type: object
      required: [id, claimId, type]
      properties:
        id:
          type: string
        claimId:
          type: string
        type:
          type: string
        fileUrl:
          type: string
        extractedText:
          type: string
        metadata:
          type: object
        createdAt:
          type: string

    AuditSection:
      type: object
      required: [id, auditId, section, score]
      properties:
        id:
          type: string
        auditId:
          type: string
        section:
          type: string
        score:
          type: number
        reasoning:
          type: string

    AuditFinding:
      type: object
      required: [id, auditId, type, severity, title, description]
      properties:
        id:
          type: string
        auditId:
          type: string
        type:
          type: string
        severity:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string

    AuditResult:
      type: object
      required: [id, claimId, overallScore, technicalScore, presentationScore, riskLevel, approvalStatus, executiveSummary, sections, findings]
      properties:
        id:
          type: string
        claimId:
          type: string
        overallScore:
          type: number
        technicalScore:
          type: number
        presentationScore:
          type: number
        riskLevel:
          type: string
        approvalStatus:
          type: string
        executiveSummary:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/AuditSection"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/AuditFinding"

    ClaimDetail:
      type: object
      required: [claim, documents]
      properties:
        claim:
          $ref: "#/components/schemas/Claim"
        documents:
          type: array
          items:
            $ref: "#/components/schemas/Document"
        audit:
          $ref: "#/components/schemas/AuditResult"
